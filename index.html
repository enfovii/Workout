    <title>PPL Workout Tracker</title>

    <style>
:root {
  color-scheme: light;
  --ink: #141923;
  --muted: #6b7280;
  --line: #e5e7eb;
  --paper: #f2f2f7;
  --white: #ffffff;
  --navy: #071d41;
  --push: #d71920;
  --pull: #075db8;
  --legs: #159145;
  --green: #10a957;
  --orange: #f59e0b;
  --red: #dc2626;
  --ios-blue: #007aff;
  --shadow: 0 12px 30px rgba(20, 25, 35, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  color: var(--ink);
  background: var(--paper);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0 0 auto;
  height: env(safe-area-inset-top);
  background: #ffffff;
  z-index: 10;
}

button,
input,
select {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

.app-shell {
  width: min(760px, calc(100% - 1rem));
  margin: 0 auto;
  padding: calc(1.25rem + env(safe-area-inset-top)) 0 calc(2rem + env(safe-area-inset-bottom));
}

.topbar,
.week-tabs,
.legend,
.day-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.9rem;
}

.eyebrow,
.day-kicker {
  margin: 0 0 0.35rem;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0.25rem;
  color: var(--navy);
  font-size: clamp(2.3rem, 6vw, 4rem);
  line-height: 0.95;
  text-transform: uppercase;
}

.muted {
  margin-bottom: 0;
  color: var(--muted);
}

.streak-card {
  display: grid;
  place-items: center;
  min-width: 7.5rem;
  min-height: 7.5rem;
  border-radius: 16px;
  color: #ffffff;
  background: var(--navy);
}

.streak-card span {
  font-size: 2rem;
  font-weight: 950;
  line-height: 1;
}

.streak-card small {
  color: #c5d1e4;
  font-size: 0.75rem;
  font-weight: 850;
  text-align: center;
  text-transform: uppercase;
}

.week-tabs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.25rem;
  margin: 1rem 0;
  padding: 0.25rem;
  background: #e6e7eb;
}

.week-tab {
  border-radius: 14px;
  min-height: 2.8rem;
  padding: 0.75rem;
  color: var(--muted);
  background: transparent;
  font-size: 1rem;
  font-weight: 900;
}

.week-tab.active {
  color: var(--ink);
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(20, 25, 35, 0.14);
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem 1.2rem;
  margin-bottom: 0.75rem;
  padding: 0.75rem 0.85rem;
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 750;
}

.legend div {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.dot {
  width: 0.78rem;
  height: 0.78rem;
  border-radius: 999px;
}

.dot.green {
  background: var(--green);
}

.dot.orange {
  background: var(--orange);
}

.dot.red {
  background: var(--red);
}

.week-grid {
  display: grid;
  gap: 0.75rem;
}

.day-card {
  overflow: hidden;
}

.day-card[data-type="push"] {
  --accent: var(--push);
}

.day-card[data-type="pull"] {
  --accent: var(--pull);
}

.day-card[data-type="legs"] {
  --accent: var(--legs);
}

.day-card[data-type="rest"] {
  --accent: var(--navy);
}

.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  border-top: 0.35rem solid var(--accent);
  border-bottom: 1px solid var(--line);
  padding: 1rem;
  background: #ffffff;
}

.day-header h2 {
  margin: 0;
  color: var(--navy);
  font-size: clamp(1.35rem, 3vw, 2.2rem);
  text-transform: uppercase;
}

.exercise-table {
  display: grid;
}

.table-heading,
.exercise-row {
  display: grid;
  grid-template-columns: minmax(13rem, 1.2fr) minmax(7rem, 0.45fr) minmax(16rem, 1fr);
  gap: 0.65rem;
  align-items: center;
  padding: 0.65rem 0.85rem;
}

.table-heading {
  color: var(--muted);
  background: #eef2f7;
  font-size: 0.78rem;
  font-weight: 950;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.exercise-row {
  border-top: 1px solid var(--line);
  background: #ffffff;
  transition:
    background 160ms ease,
    opacity 160ms ease,
    filter 160ms ease;
}

.exercise-row.is-completion-only {
  grid-template-columns: 1fr;
}

.exercise-check-wrap {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  min-width: 0;
}

.exercise-complete {
  flex: 0 0 auto;
  width: 1.35rem;
  height: 1.35rem;
  accent-color: var(--ios-blue);
}

.exercise-name-wrap strong {
  display: block;
  line-height: 1.2;
}

.exercise-name-wrap small {
  display: block;
  margin-top: 0.18rem;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
}

.weight-control {
  display: grid;
  gap: 0.32rem;
}

.weight-input,
.rep-input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 0.68rem 0.6rem;
  color: var(--ink);
  background: #ffffff;
  font-weight: 850;
}

.weight-description {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 750;
  line-height: 1.25;
}

.rep-inputs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.45rem;
}

.rep-input {
  text-align: center;
}

.rep-input.hit-green {
  border-color: var(--green);
  color: #065f35;
  background: #dcfce7;
}

.rep-input.hit-orange {
  border-color: var(--orange);
  color: #7c4a03;
  background: #fef3c7;
}

.rep-input.hit-red {
  border-color: var(--red);
  color: #7f1d1d;
  background: #fee2e2;
}

.is-exercise-complete {
  background: #eef0f4;
  opacity: 0.62;
  filter: grayscale(0.25);
}

.is-exercise-complete .exercise-name-wrap strong,
.is-exercise-complete .exercise-name-wrap small {
  color: #6f7785;
}

.rest-message {
  padding: 1rem;
  color: var(--muted);
  font-weight: 800;
}

@media (max-width: 900px) {
  .topbar {
    align-items: stretch;
    flex-direction: column;
  }

  .day-header {
    padding: 0.85rem 1rem;
  }

  .table-heading {
    display: none;
  }

  .exercise-row {
    grid-template-columns: 1fr;
    gap: 0.55rem;
    padding: 0.9rem 1rem;
  }
}

@media (max-width: 540px) {
  .app-shell {
    width: min(100% - 0.5rem, 760px);
    padding-top: calc(0.35rem + env(safe-area-inset-top));
    padding-bottom: calc(0.9rem + env(safe-area-inset-bottom));
  }

  .legend {
    display: grid;
    gap: 0.45rem;
    margin-bottom: 0.55rem;
    padding: 0.62rem 0.7rem;
    font-size: 0.76rem;
  }

  .rep-inputs {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 0.65rem;
    padding: 0.72rem;
  }

  h1 {
    font-size: 1.8rem;
  }

  .muted {
    font-size: 0.78rem;
  }

  .streak-card {
    min-width: 4.8rem;
    min-height: 4.2rem;
    padding: 0.45rem;
  }

  .streak-card span {
    font-size: 1.35rem;
  }

  .streak-card small {
    font-size: 0.58rem;
  }

  .week-tabs {
    position: sticky;
    top: env(safe-area-inset-top);
    z-index: 5;
    margin: 0.45rem 0;
    box-shadow: none;
  }

  .week-tab {
    min-height: 2.55rem;
    padding: 0.55rem;
  }

  .day-card {
    border-radius: 18px;
  }

  .day-header h2 {
    font-size: 1.1rem;
  }

  .exercise-row {
    gap: 0.42rem;
    padding: 0.58rem 0.68rem;
  }

  .exercise-check-wrap {
    align-items: flex-start;
  }

  .exercise-complete {
    width: 1.45rem;
    height: 1.45rem;
    margin-top: 0.1rem;
  }

  .exercise-name-wrap strong {
    font-size: 0.93rem;
  }

  .exercise-name-wrap small {
    font-size: 0.68rem;
  }

  .weight-input,
  .rep-input {
    min-height: 2.35rem;
    padding: 0.5rem 0.45rem;
    font-size: 0.9rem;
  }

  .weight-description {
    font-size: 0.66rem;
  }
}

/* Keep the home-screen app layout consistent even when opened in a wider browser. */
.app-shell {
  width: min(430px, calc(100% - 0.5rem));
  padding-top: calc(0.35rem + env(safe-area-inset-top));

}

.topbar {

h1 {

}

}

}

}

}

}

    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Workout overview">
        <div>
          <p class="eyebrow">A/B Push Pull Legs</p>
          <h1 id="pageTitle">A Side</h1>
          <p id="pageSubtitle" class="muted">A-side workouts: Push, Pull, Legs, then rest.</p>
        </div>
        <div class="streak-card">
          <span id="weekCompleteCount">0/20</span>
          <small>exercises done</small>
        </div>
      </section>

      <section class="week-tabs" aria-label="Workout week selector">
        <button class="week-tab active" type="button" data-week="1">A Side</button>
        <button class="week-tab" type="button" data-week="2">B Side</button>
      </section>

      <section class="legend" aria-label="Rep colour key">
        <div><span class="dot green"></span>12 reps: move up weight when all 3 sets hit 12</div>
        <div><span class="dot orange"></span>8-11 reps: keep building</div>
        <div><span class="dot red"></span>Below 8 reps: reduce or repeat weight</div>
      </section>

      <section id="weekGrid" class="week-grid" aria-label="Workout days"></section>
    </main>

    <template id="dayTemplate">
      <article class="day-card">
        <header class="day-header">
          <div>
            <p class="day-kicker"></p>
            <h2></h2>
          </div>
        </header>
        <div class="exercise-table"></div>
      </article>
    </template>

    <template id="exerciseTemplate">
      <article class="exercise-row">
        <label class="exercise-check-wrap">
          <input class="exercise-complete" type="checkbox" />
          <span class="exercise-name-wrap">
            <strong class="exercise-name"></strong>
            <small>Target 8-12 reps</small>
          </span>
        </label>
        <div class="weight-control">
          <select class="weight-input" aria-label="Weight">
            <option value="">Weight</option>
          </select>
          <small class="weight-description">Choose a weight to see plates.</small>
        </div>
        <div class="rep-inputs" aria-label="Set reps">
          <input class="rep-input" type="number" inputmode="numeric" min="0" max="99" placeholder="Set 1" aria-label="Set 1 reps" />
          <input class="rep-input" type="number" inputmode="numeric" min="0" max="99" placeholder="Set 2" aria-label="Set 2 reps" />
          <input class="rep-input" type="number" inputmode="numeric" min="0" max="99" placeholder="Set 3" aria-label="Set 3 reps" />
        </div>
      </article>
    </template>

    <script>
const weeks = {
  1: {
    title: "A Side",
    subtitle: "Push A, Pull A, Legs A, then rest.",
    days: [
      {
        label: "Day 1",
        name: "Push A",
        type: "push",
        exercises: [
          "Flat Bench Press",
          "Overhead Tricep Extension",
          "Single Front Raise",
          "Close Grip Press",
          "Arnold Press",
          "Tate Press",
          "10 min Kettlebell Swing",
        ],
      },
      {
        label: "Day 2",
        name: "Pull A",
        type: "pull",
        exercises: [
          "Romanian Deadlift",
          "Single Arm Side Row",
          "Bicep Curl",
          "Rear Fly",
          "Hammer Curl",
          "Shrug",
          "10 min Kettlebell Swing",
        ],
      },
      {
        label: "Day 3",
        name: "Legs A + HIIT",
        type: "legs",
        exercises: [
          "Squat",
          "Glute Bridge",
          "Front Lunge",
          "Seated Calf Raise",
          "Sumo Squat",
          "8 min Kettlebell Swing",
        ],
      },
      { label: "Day 4", name: "Rest Day", type: "rest", exercises: [] },
    ],
  },
  2: {
    title: "B Side",
    subtitle: "Pull B, Push B, Legs B, then rest.",
    days: [
      {
        label: "Day 1",
        name: "Pull B",
        type: "pull",
        exercises: [
          "Side Row",
          "Leaning Rear Fly",
          "Leaning Lat Row",
          "Inward Bicep Curl",
          "Seated Rear Fly",
          "10 min Kettlebell Swing",
        ],
      },
      {
        label: "Day 2",
        name: "Push B",
        type: "push",
        exercises: [
          "Incline Bench Press",
          "Lying Overhead Press",
          "Lateral Side Raise",
          "Decline Bench Press",
          "Tricep Kickback",
          "10 min Kettlebell Swing",
        ],
      },
      {
        label: "Day 3",
        name: "Legs B + HIIT",
        type: "legs",
        exercises: [
          "Goblet Squat",
          "Standing Calf Raise",
          "Romanian Deadlift",
          "Hip Thrust",
          "Bulgarian Split Squat",
          "8 min Kettlebell Swing",
        ],
      },
      { label: "Day 4", name: "Rest Day", type: "rest", exercises: [] },
    ],
  },
};

const weightOptions = {
  "8kg": {
    plates: "2x 2.5kg + 2x 1.5kg",
    change: "Starting point",
  },
  "10kg": {
    plates: "2x 5kg",
    change: "Remove all plates and fit two 5kg plates",
  },
  "13kg": {
    plates: "2x 5kg + 2x 1.5kg",
    change: "Add two 1.5kg plates",
  },
  "15kg": {
    plates: "2x 5kg + 2x 2.5kg",
    change: "Remove the two 1.5kg plates and add two 2.5kg plates",
  },
  "18kg": {
    plates: "2x 5kg + 2x 2.5kg + 2x 1.5kg",
    change: "Add two 1.5kg plates",
  },
};

const storageKey = "ppl-iphone-tracker-v2";
const state = loadState();
let activeWeek = state.activeWeek || "1";

const els = {
  pageTitle: document.querySelector("#pageTitle"),
  pageSubtitle: document.querySelector("#pageSubtitle"),
  weekCompleteCount: document.querySelector("#weekCompleteCount"),
  weekGrid: document.querySelector("#weekGrid"),
  dayTemplate: document.querySelector("#dayTemplate"),
  exerciseTemplate: document.querySelector("#exerciseTemplate"),
  weekTabs: document.querySelectorAll(".week-tab"),
};

function loadState() {
  try {
    return { activeWeek: "1", logs: {}, ...JSON.parse(localStorage.getItem(storageKey)) };
  } catch {
    return { activeWeek: "1", logs: {} };
  }
}

function saveState() {
  localStorage.setItem(storageKey, JSON.stringify(state));
}

function dayKey(weekNumber, dayIndex) {
  return `week-${weekNumber}:day-${dayIndex + 1}`;
}

function exerciseKey(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

function getDayLog(weekNumber, dayIndex) {
  const key = dayKey(weekNumber, dayIndex);
  state.logs[key] ||= { exercises: {} };
  return state.logs[key];
}

function getExerciseLog(dayLog, exerciseName) {
  const key = exerciseKey(exerciseName);
  dayLog.exercises[key] ||= { complete: false, weight: "", reps: ["", "", ""] };
  return dayLog.exercises[key];
}

function repClass(value) {
  const reps = Number(value);
  if (!value && value !== 0) return "";
  if (Number.isNaN(reps)) return "";
  if (reps >= 12) return "hit-green";
  if (reps >= 8) return "hit-orange";
  return "hit-red";
}

function isKettlebellExercise(exerciseName) {
  return exerciseName.toLowerCase().includes("kettlebell");
}

function renderWeightDescription(value) {
  const option = weightOptions[value];
  if (!option) return "Choose a weight to see plates.";
  return option.plates;
}

function render() {
  const week = weeks[activeWeek];
  els.pageTitle.textContent = week.title;
  els.pageSubtitle.textContent = week.subtitle;
  els.weekTabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.week === activeWeek));
  renderWeek(week);
}

function renderWeek(week) {
  els.weekGrid.innerHTML = "";
  const totalExercises = week.days.reduce((total, day) => total + day.exercises.length, 0);
  const completeExercises = week.days.reduce((total, day, index) => {
    const dayLog = getDayLog(activeWeek, index);
    const dayDone = day.exercises.filter((exerciseName) => getExerciseLog(dayLog, exerciseName).complete).length;
    return total + dayDone;
  }, 0);
  els.weekCompleteCount.textContent = `${completeExercises}/${totalExercises}`;

  week.days.forEach((day, dayIndex) => {
    const dayLog = getDayLog(activeWeek, dayIndex);
    const node = els.dayTemplate.content.firstElementChild.cloneNode(true);
    node.dataset.type = day.type;
    node.querySelector(".day-kicker").textContent = day.label;
    node.querySelector("h2").textContent = day.name;

    const table = node.querySelector(".exercise-table");
    if (day.type === "rest") {
      table.innerHTML = `<div class="rest-message">Rest, walk, stretch, and come back fresh for the next week.</div>`;
      els.weekGrid.append(node);
      return;
    }

    const heading = document.createElement("div");
    heading.className = "table-heading";
    heading.innerHTML = "<span>Exercise</span><span>Weight</span><span>Set reps</span>";
    table.append(heading);

    day.exercises.forEach((exerciseName) => {
      const exerciseLog = getExerciseLog(dayLog, exerciseName);
      const row = els.exerciseTemplate.content.firstElementChild.cloneNode(true);
      const kettlebellOnly = isKettlebellExercise(exerciseName);
      row.querySelector(".exercise-name").textContent = exerciseName;
      row.querySelector(".exercise-name-wrap small").textContent = kettlebellOnly
        ? "Completion only"
        : "Target 8-12 reps";
      row.classList.toggle("is-exercise-complete", exerciseLog.complete);
      row.classList.toggle("is-completion-only", kettlebellOnly);

      const completeInput = row.querySelector(".exercise-complete");
      completeInput.checked = exerciseLog.complete;
      completeInput.setAttribute("aria-label", `${exerciseName} complete`);
      completeInput.addEventListener("change", () => {
        exerciseLog.complete = completeInput.checked;
        saveState();
        render();
      });

      if (kettlebellOnly) {
        row.querySelector(".weight-control").remove();
        row.querySelector(".rep-inputs").remove();
        table.append(row);
        return;
      }

      const weightInput = row.querySelector(".weight-input");
      const weightDescription = row.querySelector(".weight-description");
      Object.keys(weightOptions).forEach((weight) => {
        const option = document.createElement("option");
        option.value = weight;
        option.textContent = weight;
        weightInput.append(option);
      });
      weightInput.value = exerciseLog.weight;
      weightDescription.textContent = renderWeightDescription(exerciseLog.weight);
      weightInput.setAttribute("aria-label", `${exerciseName} weight`);
      weightInput.addEventListener("change", () => {
        exerciseLog.weight = weightInput.value;
        weightDescription.textContent = renderWeightDescription(exerciseLog.weight);
        saveState();
      });

      const repInputs = row.querySelectorAll(".rep-input");
      repInputs.forEach((input, setIndex) => {
        input.value = exerciseLog.reps[setIndex] || "";
        input.className = `rep-input ${repClass(input.value)}`;
        input.setAttribute("aria-label", `${exerciseName} set ${setIndex + 1} reps`);
        input.addEventListener("input", () => {
          exerciseLog.reps[setIndex] = input.value;
          input.className = `rep-input ${repClass(input.value)}`;
          saveState();
        });
      });

      table.append(row);
    });

    els.weekGrid.append(node);
  });
}

els.weekTabs.forEach((tab) => {
  tab.addEventListener("click", () => {
    activeWeek = tab.dataset.week;
    state.activeWeek = activeWeek;
    saveState();
    render();
  });
});

render();

    </script>
  </body>
</html>
